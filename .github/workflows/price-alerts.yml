name: Price Alerts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  detect-price-drops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Run price alerts job
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node functions/price-alerts-job.js
